<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALL-INT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      box-sizing: border-box;
    }

    .page__title {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      letter-spacing: 0.06em;
      font-family: "等线", "DengXian", sans-serif;
    }

    .device-wrap {
      flex-shrink: 0;
      margin-left: auto;
      margin-right: auto;
      transform: scale(min(1, calc((100vh - 80px) / 874), calc((100vw - 40px) / 402)));
      transform-origin: center center;
    }

    #device {
      position: relative;
      width: 402px;
      height: 874px;
      overflow: hidden;
      background: #060606;
      box-shadow: 0 32px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    #ix-content-stage {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .ix-screen-layer {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden;
      will-change: transform;
    }

    #ix-content-stage .ix-screen-layer .layer {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    #ix-content-stage .ix-screen-layer .text {
      position: absolute;
      margin: 0;
      padding: 0;
      pointer-events: none;
    }

    #ix-nav-pin {
      position: absolute;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      isolation: isolate;
    }

    .ix-nav-glass {
      position: absolute;
      left: 38px;
      top: 770px;
      width: 326px;
      height: 77px;
      border-radius: 999px;
      z-index: 1 !important;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.38);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        0 4px 28px rgba(0, 0, 0, 0.1);
    }

    .ix-nav-dot {
      position: absolute;
      width: 52px;
      height: 50px;
      z-index: 5 !important;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    .ix-nav-icon {
      position: absolute;
      z-index: 10 !important;
      display: block;
      pointer-events: none;
      user-select: none;
      object-fit: contain;
    }

    .ix-hotspot {
      position: absolute;
      z-index: 200;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* 底部四 icon 热点须高于 002-4 / 003-4 等内容热点，避免首次点击被误识别 */
    .ix-hotspot--topnav {
      z-index: 300;
    }
    .ix-hotspot:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.45);
      outline-offset: 2px;
    }

    #device.is-animating .ix-hotspot {
      pointer-events: none;
    }

    #device[data-ix-mode="home"] #ix-nav-pin {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      font-size: 14px;
      font-family: "等线", "DengXian", sans-serif;
      z-index: 9999;
      transition: opacity 0.35s;
    }
    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader__hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      max-width: 320px;
      text-align: center;
      line-height: 1.5;
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <span id="loaderText">正在加载…</span>
    <span class="loader__hint" id="loaderHint"></span>
  </div>

  <div class="page">
    <p class="page__title">ALL-INT · 0-ALL 一级 + 1/2/3-ALL 二级按需接入</p>
    <div class="device-wrap">
      <div id="device" data-screen="001" data-ix-mode="home"></div>
    </div>
  </div>

  <script>window.__IX_ALL_MODE__ = true; window.__IX_INT_MODE__ = true;</script>
  <script>
/**
 * 001-001-1INTERACTION — 001 ⇄ 001-1 交互（不修改原 HTML 原稿）
 */
(function () {
  'use strict';

  const SCREENS = {
    '001':   { file: '001.html',   assetDir: '001_assets' },
    '001-1': { file: '001-1.html', assetDir: '001-1_assets' }
  };

  const METRICS_LEFT = 3;
  const METRICS_TOP = 158;
  const METRICS_H0 = 194;
  const METRICS_H1 = 429;
  const METRICS_STRETCH = METRICS_H1 - METRICS_H0;
  const METRICS_CAP_H = 194;
  const METRICS_RADIUS = 42;
  /** 与 001 metrics 原图一致的拉伸渐变（参照 3-2INT 无缝拉伸） */
  const METRICS_GRAD_TOP = '#C5C5C5';
  const METRICS_GRAD_BOTTOM = '#616161';

  /** M 框顶边 — 下方联动起点 */
  const BELOW_START = 357;
  /** 玻璃笑脸/月亮在 M/S 框上方，需强制随动 */
  const BELOW_FORCE_SELECTORS = [
    '.layer--glass-smile', '.layer--icon-smile',
    '.layer--glass-moon', '.layer--icon-moon'
  ];

  const FADE_MS = 1000;
  const STRETCH_MS = 1000;

  const NAV_CLASSES = [
    'layer--nav-dot', 'layer--nav-home', 'layer--nav-settings',
    'layer--nav-garage', 'layer--nav-user'
  ];

  const TOD_HEADER_SELECTORS = [
    '.layer--avatar',
    '.text--tod'
  ];

  const METRICS_FADE_CHILDREN = [
    '.layer--heart',
    '.text--heart-rate', '.text--hr-value', '.text--bpm',
    '.text--over-all', '.text--good',
    '.text--respiratory', '.text--resp-value',
    '.text--temperature', '.text--temp-value'
  ];

  /** A 框整体渐隐：底图 + 框内全部内容 */
  const BOTTOM_FADE_CHILDREN = [
    '.layer--bottom',
    '.text--hospital',
    '.text--arriving',
    '.layer--icogram'
  ];

  /** M/S 底框与玻璃 icon — 终态无感替换 001 图片层（文案用 001 原 DOM，不克隆） */
  const EXTRA_PERSISTENT_SELECTORS = [
    '.layer--mood-panel',
    '.layer--sleep-panel',
    '.layer--glass-smile', '.layer--icon-smile',
    '.layer--glass-moon', '.layer--icon-moon'
  ];

  const MS_PANEL_SELECTORS = [
    '.layer--mood-panel',
    '.layer--sleep-panel',
    '.layer--glass-smile', '.layer--icon-smile',
    '.layer--glass-moon', '.layer--icon-moon'
  ];

  /** 全程常显，永不隐藏/渐隐 */
  const MS_TEXT_SELECTORS = [
    '.text--mood-label', '.text--mood-score',
    '.text--sleep-label', '.text--sleep-value'
  ];

  /** 渐显层（001-1 新增/重定位内容，不含 M/S 框） */
  const EXTRA_FADE_SELECTORS = [
    '.chart-ring--cyan-outer', '.chart-ring--cyan-inner',
    '.chart-ring--orange-outer', '.chart-ring--orange-inner',
    '.chart-ring--white-outer', '.chart-ring--white-inner',
    '.layer--glass-back', '.layer--icon-back',
    '.layer--heart',
    '.text--history',
    '.text--heart-rate', '.text--hr-value', '.text--bpm',
    '.text--over-all', '.text--good',
    '.text--respiratory', '.text--resp-value',
    '.text--temperature', '.text--temp-value',
    '.text--avg-hr-label', '.text--avg-hr-value',
    '.text--avg-resp-label', '.text--avg-resp-value',
    '.text--avg-state-label', '.text--avg-state-value'
  ];

  /** 终态隐藏：不含 M/S 文案（文案全程常显） */
  const HIDE_001_AT_END = [
    '.layer--bottom',
    '.layer--icogram',
    '.layer--heart',
    '.text--hospital', '.text--arriving',
    '.text--heart-rate', '.text--hr-value', '.text--bpm',
    '.text--over-all', '.text--good',
    '.text--respiratory', '.text--resp-value',
    '.text--temperature', '.text--temp-value',
    'img.layer--nav'
  ];

  let currentScreen = '001';
  let isAnimating = false;
  let styleEl = null;
  let extrasStyleEl = null;
  const screenCache = Object.create(null);

  let metricsFrame = null;
  let metricsBgFill = null;
  let metricsTopCap = null;
  let metricsFadeWrap = null;
  let bottomFadeWrap = null;
  let belowEls = [];
  let extrasPersistentWrap = null;
  let extrasFadeWrap = null;
  let navLayer = null;
  let metricsImgUrl001 = '';

  const device = document.getElementById('device');
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loaderText');
  const loaderHint = document.getElementById('loaderHint');

  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function animate(duration, onFrame) {
    return new Promise((resolve) => {
      const t0 = performance.now();
      function frame(now) {
        const raw = Math.min(1, (now - t0) / duration);
        onFrame(easeInOutCubic(raw), raw);
        if (raw < 1) requestAnimationFrame(frame);
        else resolve();
      }
      requestAnimationFrame(frame);
    });
  }

  async function parseScreen(id) {
    if (screenCache[id]) return screenCache[id];
    const cfg = SCREENS[id];
    const res = await fetch(cfg.file);
    if (!res.ok) throw new Error('无法读取 ' + cfg.file);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const data = {
      id,
      style: doc.querySelector('style')?.textContent || '',
      innerHTML: doc.querySelector('.device')?.innerHTML || '',
      assetDir: cfg.assetDir
    };
    if (!data.innerHTML) throw new Error(cfg.file + ' 中未找到 .device');
    screenCache[id] = data;
    return data;
  }

  function probe(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url + '?t=' + Date.now();
    });
  }

  async function bindAssets(root, assetDir) {
    await Promise.all([...root.querySelectorAll('[data-asset]')].map(async (el) => {
      const local = assetDir + '/' + el.dataset.asset;
      if (await probe(local)) el.src = local;
      else el.removeAttribute('src');
    }));
  }

  function applyStyles(screenId, cssText) {
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'ix-all-screen-001-1';
      styleEl.dataset.ixRoute = '001-1';
      document.head.appendChild(styleEl);
    }
    styleEl.textContent = '/* ' + screenId + ' */\n' + cssText;

    if (extrasStyleEl) {
      extrasStyleEl.textContent = '';
    }
    if (window.__IX_ALL_MODE__ && window.IX_ALL) {
      window.IX_ALL.activateModuleStyles('001-1');
    }
  }

  function isNavEl(el) {
    if (el.classList.contains('layer--nav')) return true;
    return NAV_CLASSES.some((c) => el.classList.contains(c));
  }

  function markZones() {
    belowEls = [];
    device.querySelectorAll('.layer, .text').forEach((el) => {
      delete el.dataset.zone;
      if (isNavEl(el)) {
        el.dataset.zone = 'nav';
        return;
      }
      if (extrasPersistentWrap && extrasPersistentWrap.contains(el)) return;
      if (extrasFadeWrap && extrasFadeWrap.contains(el)) return;
      if (navLayer && navLayer.contains(el)) return;
      if (metricsFadeWrap && metricsFadeWrap.contains(el)) return;
      if (bottomFadeWrap && bottomFadeWrap.contains(el)) return;
      const header = device.querySelector('#ix-tod-header');
      if (header && header.contains(el)) return;
      if (metricsFrame && metricsFrame.contains(el)) return;

      const forced = BELOW_FORCE_SELECTORS.some((sel) => el.matches(sel));
      const top = parseFloat(getComputedStyle(el).top);
      if (forced || (!Number.isNaN(top) && top >= BELOW_START - 1)) {
        el.dataset.zone = 'below';
        belowEls.push(el);
      }
    });
  }

  function setupNavGlass() {
    device.querySelectorAll('img.layer--nav').forEach((el) => {
      el.style.visibility = 'hidden';
    });

    let glass = device.querySelector('.ix-nav-glass');
    if (!glass) {
      glass = document.createElement('div');
      glass.className = 'ix-nav-glass';
      glass.setAttribute('aria-hidden', 'true');
      device.appendChild(glass);
    }
    glass.style.visibility = 'visible';
    glass.style.opacity = '1';
  }

  function setupNavLayer() {
    let layer = device.querySelector('#ix-nav-layer');
    if (!layer) {
      layer = document.createElement('div');
      layer.id = 'ix-nav-layer';
      layer.className = 'ix-nav-layer';
      device.appendChild(layer);
    }

    NAV_CLASSES.forEach((cls) => {
      const el = device.querySelector('.' + cls);
      if (el && el.parentNode !== layer) layer.appendChild(el);
    });

    navLayer = layer;

    const glass = device.querySelector('.ix-nav-glass');
    if (glass) device.appendChild(glass);
    device.appendChild(layer);
  }

  function setupTodHeaderLayer() {
    let header = device.querySelector('#ix-tod-header');
    if (!header) {
      header = document.createElement('div');
      header.id = 'ix-tod-header';
      header.className = 'ix-tod-header';
      device.appendChild(header);
    }
    TOD_HEADER_SELECTORS.forEach((sel) => {
      const el = device.querySelector(sel);
      if (el && el.parentNode !== header) header.appendChild(el);
    });
    ensureTodHeaderVisible();
  }

  function ensureTodHeaderVisible() {
    const header = device.querySelector('#ix-tod-header');
    if (!header) return;
    header.style.opacity = '1';
    header.style.visibility = 'visible';
    header.querySelectorAll('.layer, .text').forEach((el) => {
      el.style.opacity = '1';
      el.style.visibility = 'visible';
    });
  }

  function setupMetricsFadeLayer() {
    let wrap = device.querySelector('#ix-metrics-fade');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'ix-metrics-fade';
      wrap.className = 'ix-metrics-fade';
      device.appendChild(wrap);
    }
    METRICS_FADE_CHILDREN.forEach((sel) => {
      const el = device.querySelector(sel);
      if (el && el.parentNode !== wrap) wrap.appendChild(el);
    });
    metricsFadeWrap = wrap;
    setMetricsFadeVisible(true);
  }

  function setMetricsFadeOpacity(value) {
    if (!metricsFadeWrap) return;
    metricsFadeWrap.style.opacity = String(value);
  }

  function setMetricsFadeVisible(show) {
    if (!metricsFadeWrap) return;
    metricsFadeWrap.style.visibility = show ? 'visible' : 'hidden';
    metricsFadeWrap.style.opacity = show ? '1' : '0';
  }

  function setupBottomFadeLayer() {
    let wrap = device.querySelector('#ix-bottom-fade');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'ix-bottom-fade';
      wrap.className = 'ix-bottom-fade';
      device.appendChild(wrap);
    }
    BOTTOM_FADE_CHILDREN.forEach((sel) => {
      const el = device.querySelector(sel);
      if (el && el.parentNode !== wrap) wrap.appendChild(el);
    });
    bottomFadeWrap = wrap;
    setBottomFadeVisible(true);
  }

  function setBottomFadeOpacity(value) {
    if (!bottomFadeWrap) return;
    bottomFadeWrap.style.opacity = String(value);
  }

  function setBottomFadeVisible(show) {
    if (!bottomFadeWrap) return;
    bottomFadeWrap.style.visibility = show ? 'visible' : 'hidden';
    bottomFadeWrap.style.opacity = show ? '1' : '0';
  }

  function setFadeOutOpacity(value) {
    setMetricsFadeOpacity(value);
    setBottomFadeOpacity(value);
  }

  function setFadeOutVisible(show) {
    setMetricsFadeVisible(show);
    setBottomFadeVisible(show);
  }

  async function fadeContentOut() {
    setFadeOutVisible(true);
    setFadeOutOpacity(1);
    await animate(FADE_MS, (_eased, raw) => {
      setFadeOutOpacity(1 - raw);
    });
    setFadeOutVisible(false);
  }

  function showPersistentExtras() {
    if (!extrasPersistentWrap) return;
    extrasPersistentWrap.style.visibility = 'visible';
    extrasPersistentWrap.style.opacity = '1';
  }

  function hidePersistentExtras() {
    if (!extrasPersistentWrap) return;
    extrasPersistentWrap.style.visibility = 'hidden';
    extrasPersistentWrap.style.opacity = '1';
  }

  async function fadeExtrasIn() {
    if (!extrasFadeWrap) return;
    ensureMsTextVisible();
    extrasFadeWrap.style.opacity = '0';
    extrasFadeWrap.style.visibility = 'visible';
    await animate(FADE_MS, (_eased, raw) => {
      extrasFadeWrap.style.opacity = String(raw);
      ensureMsTextVisible();
    });
    ensureMsTextVisible();
  }

  async function fadeExtrasOut() {
    if (!extrasFadeWrap) return;
    ensureMsTextVisible();
    await animate(FADE_MS, (_eased, raw) => {
      extrasFadeWrap.style.opacity = String(1 - raw);
      ensureMsTextVisible();
    });
    extrasFadeWrap.style.visibility = 'hidden';
    ensureMsTextVisible();
  }

  async function fadeContentIn() {
    setFadeOutVisible(true);
    setFadeOutOpacity(0);
    await animate(FADE_MS, (_eased, raw) => {
      setFadeOutOpacity(raw);
    });
  }

  function setupMetricsStretchFrame() {
    metricsTopCap = device.querySelector('.layer--metrics');
    if (!metricsTopCap || device.querySelector('.ix-metrics-frame')) {
      metricsFrame = device.querySelector('.ix-metrics-frame');
      metricsBgFill = metricsFrame ? metricsFrame.querySelector('.ix-metrics-bg-fill') : null;
      metricsTopCap = metricsFrame ? metricsFrame.querySelector('.layer--metrics') : metricsTopCap;
      return;
    }

    metricsFrame = document.createElement('div');
    metricsFrame.className = 'ix-metrics-frame';
    metricsFrame.style.borderRadius = METRICS_RADIUS + 'px';

    metricsBgFill = document.createElement('div');
    metricsBgFill.className = 'ix-metrics-bg-fill';
    metricsBgFill.setAttribute('aria-hidden', 'true');

    const parent = metricsTopCap.parentNode;
    parent.insertBefore(metricsFrame, metricsTopCap);
    metricsFrame.appendChild(metricsBgFill);
    metricsFrame.appendChild(metricsTopCap);

    metricsTopCap.style.left = '0';
    metricsTopCap.style.top = '0';
    metricsTopCap.style.width = '393px';
    metricsTopCap.style.height = METRICS_CAP_H + 'px';

    setMetricsCapStretchMode(true);
    updateMetricsGradient(METRICS_H0);
    setMetricsTopCapVisible(true);
  }

  function gradCss(top, bottom) {
    return 'linear-gradient(180deg, ' + top + ' 0%, ' + bottom + ' 100%)';
  }

  function setMetricsTopCapVisible(visible) {
    if (!metricsTopCap) return;
    metricsTopCap.style.visibility = visible ? 'visible' : 'hidden';
    metricsTopCap.style.opacity = visible ? '1' : '0';
    if (metricsFrame) metricsFrame.dataset.capHidden = visible ? 'false' : 'true';
  }

  /** 终态：完整 metrics 原图顶盖 */
  function setMetricsCapStretchMode(stretchCap) {
    if (!metricsFrame) return;
    if (stretchCap) {
      metricsFrame.classList.remove('is-full-cap');
      if (metricsTopCap) metricsTopCap.style.height = METRICS_CAP_H + 'px';
      if (metricsBgFill) {
        metricsBgFill.style.visibility = 'visible';
        metricsBgFill.style.opacity = '1';
      }
    } else {
      metricsFrame.classList.add('is-full-cap');
      if (metricsTopCap) metricsTopCap.style.height = METRICS_H1 + 'px';
      if (metricsBgFill) {
        metricsBgFill.style.visibility = 'hidden';
        metricsBgFill.style.opacity = '0';
      }
      if (metricsFrame) metricsFrame.style.background = 'transparent';
    }
  }

  /** 参照 3-2INT：顶盖隐藏时整框同步渐变拉伸，无分段 */
  function updateMetricsGradient(h) {
    if (!metricsFrame) return;
    metricsFrame.style.height = h + 'px';

    if (metricsFrame.classList.contains('is-full-cap')) {
      metricsFrame.style.background = 'transparent';
      return;
    }

    const capHidden = metricsFrame.dataset.capHidden === 'true';
    if (!capHidden) {
      metricsFrame.style.background = 'transparent';
      if (metricsBgFill) metricsBgFill.style.background = 'transparent';
      return;
    }

    const grad = gradCss(METRICS_GRAD_TOP, METRICS_GRAD_BOTTOM);
    metricsFrame.style.background = grad;
    metricsFrame.style.backgroundSize = '100% ' + h + 'px';
    if (metricsBgFill) {
      metricsBgFill.style.height = h + 'px';
      metricsBgFill.style.background = grad;
      metricsBgFill.style.backgroundSize = '100% ' + h + 'px';
    }
  }

  function applyStretch(delta) {
    updateMetricsGradient(METRICS_H0 + delta);
    belowEls.forEach((el) => {
      el.style.transform = 'translateY(' + delta + 'px)';
    });
  }

  function resetTransforms() {
    applyStretch(0);
    belowEls.forEach((el) => {
      el.style.removeProperty('transform');
      el.style.removeProperty('will-change');
    });
  }

  function isExtrasEl(el) {
    return (extrasPersistentWrap && extrasPersistentWrap.contains(el))
      || (extrasFadeWrap && extrasFadeWrap.contains(el));
  }

  function ensureMsTextVisible() {
    MS_TEXT_SELECTORS.forEach((sel) => {
      device.querySelectorAll(sel).forEach((el) => {
        if (isExtrasEl(el)) return;
        el.style.visibility = 'visible';
        el.style.opacity = '1';
      });
    });
  }

  function clearMsTextTransforms() {
    MS_TEXT_SELECTORS.forEach((sel) => {
      device.querySelectorAll(sel).forEach((el) => {
        if (isExtrasEl(el)) return;
        el.style.removeProperty('transform');
        el.style.removeProperty('will-change');
      });
    });
  }

  function hide001Panels() {
    MS_PANEL_SELECTORS.forEach((sel) => {
      device.querySelectorAll(sel).forEach((el) => {
        if (isExtrasEl(el)) return;
        el.style.visibility = 'hidden';
        el.style.opacity = '0';
        el.style.removeProperty('transform');
      });
    });
  }

  function show001Panels() {
    MS_PANEL_SELECTORS.forEach((sel) => {
      device.querySelectorAll(sel).forEach((el) => {
        if (isExtrasEl(el)) return;
        el.style.visibility = 'visible';
        el.style.opacity = '1';
      });
    });

    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const data = {

      style: doc.querySelector('style')?.textContent || '',
      innerHTML: doc.querySelector('.device')?.innerHTML || '',

    if (!data.innerHTML) throw new Error(cfg.file + ' 中未找到 .device');

  async function transitionForward() {

      innerHTML: doc.querySelector('.device')?.innerHTML || '',
      assetDir: cfg.assetDir
    };
    if (!data.innerHTML) throw new Error(cfg.file + ' 中未找到 .device');
    screenCache[id] = data;
    return data;
  }

  function probe(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = url + '?t=' + Date.now();
    });
  }

  async function bindAssets(root, assetDir) {
    await Promise.all([...root.querySelectorAll('[data-asset]')].map(async (el) => {
      const local = assetDir + '/' + el.dataset.asset;
      if (await probe(local)) el.src = local;
      else el.removeAttribute('src');
    }));
  }

  function applyStyles(screenId, cssText) {
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'ix-all-screen-003-3';
      styleEl.dataset.ixRoute = '003-3';
      document.head.appendChild(styleEl);
    }
    styleEl.textContent = '/* ' + screenId + ' */\n' + cssText;

    if (!extrasStyleEl) {
      extrasStyleEl = document.createElement('style');
      extrasStyleEl.id = 'ix-all-extras-003-3';
      extrasStyleEl.dataset.ixRoute = '003-3';
      document.head.appendChild(extrasStyleEl);
    }
    extrasStyleEl.textContent = '/* 003-3 extras */\n' + EXTRAS_CSS;
    if (window.__IX_ALL_MODE__ && window.IX_ALL) {
      window.IX_ALL.activateModuleStyles('003-3');
    }
  }

  function isNavEl(el) {
    if (el.classList.contains('layer--nav')) return true;
    return NAV_CLASSES.some((c) => el.classList.contains(c));
  }

  function isOwnerInnerEl(el) {
    if (ownerContent && ownerContent.contains(el)) return true;
    if (ownerTopCap && el === ownerTopCap) return true;
    return false;
  }

  function isAiFrameEl(el) {
    return !!(aiFrame && aiFrame.contains(el));
  }

  function queryAiFadeEls() {
    return AI_FADE_SELECTORS
      .map((sel) => device.querySelector(sel))
      .filter(Boolean);
  }

  function markZones() {
    belowEls = [];
    device.querySelectorAll('.layer, .text').forEach((el) => {
      delete el.dataset.zone;
      if (isNavEl(el)) {
        el.dataset.zone = 'nav';
        return;
      }
      if (extrasWrap && extrasWrap.contains(el)) return;
      if (isOwnerInnerEl(el)) return;
      if (isAiFrameEl(el)) return;
      if (petFrame && petFrame.contains(el)) return;
      if (editWrap && editWrap.contains(el)) return;
      if (editTopWrap && editTopWrap.contains(el)) return;
      const header = device.querySelector('#ix-pet-header');
      if (header && header.contains(el)) return;

      const forced = BELOW_FORCE_SELECTORS.some((sel) => el.matches(sel));
      const top = parseFloat(getComputedStyle(el).top);
      if (forced || (!Number.isNaN(top) && top >= BELOW_START - 1)) {
        el.dataset.zone = 'below';
        belowEls.push(el);
      }
    });
  }

  function setupNavGlass() {
    const bar = device.querySelector('img.layer--nav');
    if (bar) bar.style.visibility = 'hidden';

    let glass = device.querySelector('.ix-nav-glass');
    if (!glass) {
      glass = document.createElement('div');
      glass.className = 'ix-nav-glass';
      glass.setAttribute('aria-hidden', 'true');
      device.appendChild(glass);
    }
  }

  function setupPetHeaderLayer() {
    let header = device.querySelector('#ix-pet-header');
    if (!header) {
      header = document.createElement('div');
      header.id = 'ix-pet-header';
      header.className = 'ix-pet-header';
      device.appendChild(header);
    }
    PET_HEADER_SELECTORS.forEach((sel) => {
      const el = device.querySelector(sel);
      if (el && el.parentNode !== header) header.appendChild(el);
    });
    ensurePetHeaderVisible();

  function ensurePetHeaderVisible() {
    const header = device.querySelector('#ix-pet-header');
    if (!header) return;
    header.style.opacity = '1';
    header.style.visibility = 'visible';
    header.querySelectorAll('.layer, .text').forEach((el) => {
      el.style.opacity = '1';
      el.style.visibility = 'visible';

  function setupEditTopLayer() {

      wrap.className = 'ix-edit-top';
      device.appendChild(wrap);

    EDIT_TOP_CHILDREN.forEach((sel) => {

    editTopWrap = wrap;
    setEditTopVisible(true);

  function setEditTopOpacity(value) {
    if (!editTopWrap) return;

  function setEditTopVisible(show) {
    if (!editTopWrap) return;
    editTopWrap.style.visibility = show ? 'visible' : 'hidden';
    editTopWrap.style.opacity = show ? '1' : '0';
    EDIT_TOP_CHILDREN.forEach((sel) => {
      const el = editTopWrap.querySelector(sel);
      if (!el) return;
      el.style.opacity = show ? '1' : '0';
      el.style.visibility = show ? 'visible' : 'hidden';

  function setEditOpacity(value) {

  }

  function setEditVisible(show) {
    if (!editWrap) return;
    editWrap.style.visibility = show ? 'visible' : 'hidden';
    editWrap.style.opacity = show ? '1' : '0';
    EDIT_BOTTOM_CHILDREN.forEach((sel) => {

  async function fadeAiAndEditsOut() {
    setAiFadeVisible(true);
    setEditTopVisible(true);
    setEditVisible(true);
    await animate(FADE_MS, (_eased, raw) => {
      const opacity = 1 - raw;
      setAiFadeOpacity(opacity);
      setEditOpacityBoth(opacity);
    });
    setAiFadeVisible(false);
    setEditTopVisible(false);
    setEditVisible(false);
  }

  async function fadeAiAndEditsIn() {
    setAiFadeVisible(true);
    setEditTopVisible(true);
    setEditVisible(true);
    setAiFadeOpacity(0);
    setEditOpacityBoth(0);
    await animate(FADE_MS, (_eased, raw) => {
      setAiFadeOpacity(raw);
      setEditOpacityBoth(raw);
    });

  function ensureAiFrameForAnimation() {
    if (aiFrame) return;
    aiTopCap = device.querySelector('.layer--section-ai');

    const parent = aiTopCap.parentNode;
    parent.insertBefore(aiFrame, aiTopCap);

  function destroyAiFrameFor003() {
    if (!aiFrame || !aiTopCap) {
      aiFrame = null;
      aiBgFill = null;
      aiTopCap = null;
      return;
    }
    const parent = aiFrame.parentNode;
    if (parent) parent.insertBefore(aiTopCap, aiFrame);
    aiFrame.remove();
    aiFrame = null;
    aiBgFill = null;
    aiTopCap.style.removeProperty('left');
    aiTopCap.style.removeProperty('top');
    aiTopCap.style.removeProperty('width');
    aiTopCap.style.removeProperty('height');
    aiTopCap.style.removeProperty('visibility');
    aiTopCap.style.removeProperty('opacity');
    aiTopCap.style.removeProperty('object-fit');
    aiTopCap = null;
    markZones();
  }

  function gradCss(top, bottom) {
    return 'linear-gradient(180deg, ' + top + ' 0%, ' + bottom + ' 100%)';
  }

  function updatePetGradient(h) {
    const grad = gradCss(PET_GRAD_TOP, PET_GRAD_BOTTOM);
    if (petFrame) {
      petFrame.style.height = h + 'px';
      petFrame.style.background = grad;
      petFrame.style.backgroundSize = '100% ' + h + 'px';
    }
    if (petBgFill) {
      petBgFill.style.height = h + 'px';
      petBgFill.style.background = grad;
      petBgFill.style.backgroundSize = '100% ' + h + 'px';
    }
  }

  function updateOwnerGradient(h, top) {
    const grad = gradCss(OWNER_GRAD_TOP, OWNER_GRAD_BOTTOM);
    if (ownerFrame) {
      ownerFrame.style.top = top + 'px';
      ownerFrame.style.height = h + 'px';
      ownerFrame.style.background = grad;
      ownerFrame.style.backgroundSize = '100% ' + h + 'px';
    }
    if (ownerBgFill) {
      ownerBgFill.style.height = h + 'px';
      ownerBgFill.style.background = grad;
      ownerBgFill.style.backgroundSize = '100% ' + h + 'px';
    }
  }

  function clearAiStretchBackground() {
    if (aiFrame) {
      aiFrame.style.background = '';
      aiFrame.style.backgroundImage = '';
      aiFrame.style.backgroundSize = '';
      aiFrame.style.backgroundPosition = '';
      aiFrame.style.backgroundRepeat = '';
    }
    if (aiBgFill) {
      aiBgFill.style.display = 'none';
      aiBgFill.style.background = '';
      aiBgFill.style.backgroundImage = '';
      aiBgFill.style.backgroundSize = '';
      aiBgFill.style.backgroundPosition = '';
      aiBgFill.style.backgroundRepeat = '';
      aiBgFill.style.removeProperty('top');
      aiBgFill.style.removeProperty('height');
    }
    if (aiTopCap) {
      aiTopCap.style.removeProperty('object-fit');
      aiTopCap.style.removeProperty('object-position');
    }
  }

  /**
   * 缩短：background-size 随 h 缩放（与现 reverse 一致，圆角正常）
   * 拉伸：固定为 003-3 原图高度，仅随框高增加露出更多区域（缩短的倒序，圆角不缩放）
   */
  function updateAiStretchFill(h) {
    if (!aiStretchUrl) return;
    const bg = 'url("' + aiStretchUrl + '")';
    const size = aiStretchMode === 'reveal'
      ? ('393px ' + AI_H1 + 'px')
      : ('393px ' + h + 'px');
    if (aiFrame) {
      aiFrame.style.backgroundImage = bg;
      aiFrame.style.backgroundSize = size;
      aiFrame.style.backgroundRepeat = 'no-repeat';
      aiFrame.style.backgroundPosition = '0 0';
    }
    if (aiBgFill) {
      aiBgFill.style.display = 'block';
      aiBgFill.style.top = '0';
      aiBgFill.style.height = h + 'px';
      aiBgFill.style.backgroundImage = bg;
      aiBgFill.style.backgroundSize = size;
      aiBgFill.style.backgroundRepeat = 'no-repeat';
      aiBgFill.style.backgroundPosition = '0 0';
    }
  }

  function updateAiFrame(h, top) {
    if (aiFrame) {
      aiFrame.style.top = top + 'px';
      aiFrame.style.height = h + 'px';
      aiFrame.style.borderRadius = AI_RADIUS + 'px';
    }
    if (aiStretchUrl) updateAiStretchFill(h);
  }

  function setAiTopCapVisible(visible) {
    if (!aiTopCap) return;
    aiTopCap.style.visibility = visible ? 'visible' : 'hidden';
    aiTopCap.style.opacity = visible ? '1' : '0';
    if (aiFrame) aiFrame.dataset.capHidden = visible ? 'false' : 'true';

  function setPetTopCapVisible(visible) {

    if (ownerFrame) ownerFrame.dataset.capHidden = visible ? 'false' : 'true';

  function applyProgress(t) {
    const petH = PET_H0 - PET_SHRINK * t;
    const ownerTop = OWNER_TOP0 + OWNER_TOP_SHIFT * t;
    const ownerH = OWNER_H0 + OWNER_HEIGHT_DELTA * t;
    const aiTop = AI_TOP0 + AI_TOP_SHIFT * t;
    const aiH = AI_H0 + AI_HEIGHT_DELTA * t;
    const belowShift = PAYMENT_SHIFT * t;

    updatePetGradient(petH);
    updateOwnerGradient(ownerH, ownerTop);
    if (aiFrame) updateAiFrame(aiH, aiTop);
    belowEls.forEach((el) => {
      el.style.transform = 'translateY(' + belowShift + 'px)';
    });
  }

  function resetTransforms() {

  function cacheRefs() {
    petFrame = device.querySelector('.ix-pet-frame');

    petTopCap = petFrame ? petFrame.querySelector('.layer--section-pet') : null;

  function updatePaymentStretchFill(h, top) {
    if (!paymentStretchUrl) return;
    const bg = 'url("' + paymentStretchUrl + '")';
    const size = paymentStretchMode === 'reveal'
      ? ('393px ' + PAYMENT_H1 + 'px')
      : ('393px ' + h + 'px');
    const posY = paymentStretchMode === 'reveal' ? (-top + PAYMENT_TOP1) + 'px' : '0';
    if (paymentFrame) {
      paymentFrame.style.backgroundImage = bg;
      paymentFrame.style.backgroundSize = size;
      paymentFrame.style.backgroundRepeat = 'no-repeat';
      paymentFrame.style.backgroundPosition = '0 ' + posY;
    }
    if (paymentBgFill) {
      paymentBgFill.style.display = 'block';
      paymentBgFill.style.top = '0';
      paymentBgFill.style.height = h + 'px';
      paymentBgFill.style.backgroundImage = bg;
      paymentBgFill.style.backgroundSize = size;
      paymentBgFill.style.backgroundRepeat = 'no-repeat';
      paymentBgFill.style.backgroundPosition = '0 ' + posY;

      updatePetFrame(PET_H);
      if (showSections) {
        petFrame.style.visibility = 'visible';
        petFrame.style.opacity = '1';

      const petLocal = SCREENS['003'].assetDir + '/section-pet.png';
      if (await probe(petLocal)) petTopCap.src = petLocal;
      setPetTopCapVisible(true);

    if (ownerTopCap && ownerFrame) {
      updateOwnerFrame(OWNER_H, OWNER_TOP);
      if (showSections) {
        ownerFrame.style.visibility = 'visible';
        ownerFrame.style.opacity = '1';
      }
      const ownerLocal = SCREENS['003'].assetDir + '/section-owner.png';
      if (await probe(ownerLocal)) ownerTopCap.src = ownerLocal;
      setOwnerTopCapVisible(true);
    }
    if (ownerContent) {
      const dir = SCREENS['003'].assetDir;
      const files = {
        '.layer--avatar-abby': 'avatar-abby.png',
        '.layer--icon-user': 'icon-user.png'
      };
      await Promise.all(Object.entries(files).map(async ([sel, file]) => {
        const el = ownerContent.querySelector(sel);
        if (!el) return;
        const local = dir + '/' + file;
        if (await probe(local)) el.src = local;
      }));
    }

    if (aiTopCap && aiFrame) {
      updateAiFrame(AI_H, AI_TOP);
      if (showSections) {
        aiFrame.style.visibility = 'visible';
        aiFrame.style.opacity = '1';
      } else {
        aiFrame.style.removeProperty('visibility');
        aiFrame.style.removeProperty('opacity');
      }
      const aiLocal = SCREENS['003'].assetDir + '/section-ai.png';
      if (await probe(aiLocal)) aiTopCap.src = aiLocal;
      setAiTopCapVisible(true);
    }

    if (paymentTopCap && paymentFrame) {
      paymentStretchUrl = '';
      clearPaymentStretchBackground();
      paymentFrame.style.left = PAYMENT_LEFT + 'px';
      updatePaymentFrame(PAYMENT_H0, PAYMENT_TOP0);
      paymentFrame.style.visibility = 'visible';
      paymentFrame.style.opacity = '1';
      const paymentLocal = SCREENS['003'].assetDir + '/section-payment.png';
      if (await probe(paymentLocal)) paymentTopCap.src = paymentLocal;
      paymentTopCap.style.removeProperty('object-fit');

  async function buildExtrasLayer() {
    const old = device.querySelector('#ix-extras');
    if (old) old.remove();

    const data = await parseScreen('003-4');
    const tmp = document.createElement('div');
    tmp.innerHTML = data.innerHTML;

    extrasWrap = document.createElement('div');
    extrasWrap.id = 'ix-extras';
    extrasWrap.className = 'ix-extras';

    EXTRA_SELECTORS.forEach((sel) => {
      const node = tmp.querySelector(sel);
      if (!node) return;
      const clone = node.cloneNode(true);
      if (sel.includes('glass') || clone.classList.contains('glass')) {
        clone.classList.add('glass');
      }
      extrasWrap.appendChild(clone);
    });

    const addrSrc = tmp.querySelector('.text--addr-detail');
    const addrClone = extrasWrap.querySelector('.text--addr-detail');
    if (addrClone && addrSrc) {
      addrClone.textContent = addrSrc.textContent;
      if (!addrClone.classList.contains('text--pre')) {
        addrClone.classList.add('text--pre');
      }
    }

    device.appendChild(extrasWrap);
    await bindAssets(extrasWrap, data.assetDir);

    queryExtrasFadeEls().forEach((el) => {
      el.style.opacity = '0';
      el.style.visibility = 'hidden';
    });
  }

    applyStyles('003', data.style);

    await bindAssets(device, SCREENS['003'].assetDir);
    setupPetShrinkFrame();
    setupOwnerFrame();
    setupAiFrame();
    setupPaymentStretchFrame();
    setupAiGroup();
    setupPetHeaderLayer();
    setupEditTopLayer();
    setupEditBottomLayer();
    await buildExtrasLayer();
    await setupNavPinLayer();
    cacheRefs();
    await ensureCaps003();
    if (extrasWrap) extrasWrap.style.opacity = '0';

  /** 003 → 003-4：渐隐 → 蓝框上移 → 003-4 内容渐显 */
  async function transitionForward() {
    if (isAnimating) return;
    isAnimating = true;
    device.classList.add('is-animating');
    clearHotspots();
    ensureNavPinned();

    if (extrasWrap) extrasWrap.style.opacity = '0';

    await fade003ContentOut();

    ensureNavPinOnTop();
    paymentStretchUrl = '';
    clearPaymentStretchBackground();
    setPaymentTopCapVisible(true);
    applyPaymentStretch(0);

    if (paymentFrame) paymentFrame.style.willChange = 'top, height';

    await animate(STRETCH_MS, (eased) => {
      applyPaymentStretch(eased);
      ensureNavPinned();
    });

    if (paymentFrame) paymentFrame.style.removeProperty('will-change');

    await apply0034FinalVisuals();
    ensureNavPinned();

    await fadeExtrasIn();
    finalizeExtrasVisible();

    set003ContentLocked(false);
    currentScreen = '003-4';
    device.dataset.screen = '003-4';
    device.classList.remove('is-animating');
    isAnimating = false;
    ensureNavPinOnTop();
    setupPaymentHotspot();
  }

  /** 003-4 → 003：返回键；003-4 渐隐 → 蓝框下移 → 003 内容渐显 */
  async function transitionReverse() {
    if (isAnimating) return;
    isAnimating = true;
    device.classList.add('is-animating');
    clearHotspots();
    ensureNavPinned();

    await fadeExtrasOut();

    lock003ContentHidden();

    if (paymentTopCap && paymentFrame) {
      paymentFrame.style.left = '5px';
      applyPaymentStretch(1);
      setPaymentTopCapVisible(true);
      if (paymentFrame) paymentFrame.style.willChange = 'top, height';

      await animate(STRETCH_MS, (eased) => {
        applyPaymentStretch(1 - eased);
        ensureNavPinned();
      });

      if (paymentFrame) paymentFrame.style.removeProperty('will-change');

      paymentFrame.style.left = PAYMENT_LEFT + 'px';
      paymentStretchUrl = '';
      clearPaymentStretchBackground();
      const paymentLocal = SCREENS['003'].assetDir + '/section-payment.png';
      if (await probe(paymentLocal)) paymentTopCap.src = paymentLocal;
      paymentTopCap.style.removeProperty('object-fit');
      paymentTopCap.style.removeProperty('object-position');
      updatePaymentFrame(PAYMENT_H0, PAYMENT_TOP0);
    }

    ensureNavPinned();
    await ensureCaps003(false);
    await fade003ContentIn();

    device.dataset.screen = '003';
    currentScreen = '003';
    device.classList.remove('is-animating');
    isAnimating = false;
    ensureNavPinned();
    setupPaymentHotspot();
  }

  async function init() {
    const hasEmbed = !!document.getElementById('ix-embed-003-device');
    const isHttp = location.protocol === 'http:' || location.protocol === 'https:';

    if (!isHttp && !hasEmbed) {
      loaderText.textContent = '请用 Live Server 打开';
      loaderHint.textContent =
        '在 VS Code 中右键 3-4INT.html → Open with Live Server。不要直接双击打开（file:// 无法加载外部页面）。';

    Object.keys(navDots).forEach((tab) => {
      const dot = navDots[tab];
      dot.style.transition = 'opacity ' + NAV_MS + 'ms ease';
      dot.style.opacity = tab === toTab ? '1' : '0';
    });
  }

  function clearNavTransitions() {
    Object.values(navIcons).forEach((img) => img.style.removeProperty('transition'));
    Object.values(navDots).forEach((dot) => dot.style.removeProperty('transition'));
  }

  function clearHotspots() {
    device.querySelectorAll('.ix-hotspot').forEach((el) => el.remove());
  }

  function clearTopNavHotspots() {
    device.querySelectorAll('.ix-hotspot--topnav').forEach((el) => el.remove());
  }

  function setupHotspots() {
    if (window.__IX_INT_MODE__) clearTopNavHotspots();
    else clearHotspots();
    if (isAnimating) return;

    Object.entries(TABS).forEach(([tab, cfg]) => {
      if (PAGES[currentPage].tab === tab) return;
      const hs = cfg.hotspot;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = window.__IX_INT_MODE__
        ? 'ix-hotspot ix-hotspot--topnav ix-hotspot--' + tab
        : 'ix-hotspot ix-hotspot--' + tab;
      btn.setAttribute('aria-label', cfg.label);
      btn.style.cssText =
        'left:' + hs.left + 'px;top:' + hs.top + 'px;width:' + hs.width + 'px;height:' + hs.height + 'px';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        navigateTo(cfg.page);
      });
      device.appendChild(btn);
    });
  }

  async function mountPage(pageId, options) {
    const opts = options || {};
    /* INT：从二级返回时 device 内仍有 drill DOM，必须先清空再挂壳 */
    if (window.__IX_INT_MODE__) {
      device.innerHTML = '';
      resetShellRefs();
      resetDeviceVisualState();
    }
    ensureShell();

    const { layer, data } = await buildScreenLayer(pageId);
    layer.style.transition = 'none';
    layer.style.transform = opts.initialTransform || 'translateY(0)';

    contentStage.innerHTML = '';
    contentStage.appendChild(layer);

    applyPageStyles(data.style);
    currentPage = pageId;
    device.dataset.screen = pageId;
    if (window.__IX_INT_MODE__) {
      device.dataset.ixMode = 'home';
      delete device.dataset.ixRoute;
      device.removeAttribute('data-content003');
    }

    const activeTab = PAGES[pageId].tab;
    await syncNavVisual(pageId, activeTab);

    if (!opts.skipHotspots) setupHotspots();
    if (window.__IX_INT_MODE__ && window.IX_INT?.onPageReady) {
      await window.IX_INT.onPageReady(pageId);
    }
    return layer;
  }

  async function navigateTo(targetPage) {
    if (isAnimating || targetPage === currentPage) return;

    const fromPage = currentPage;
    const fromTab = PAGES[fromPage].tab;
    const toTab = PAGES[targetPage].tab;

    isAnimating = true;
    device.classList.add('is-animating');
    if (window.__IX_INT_MODE__) {
      device.querySelectorAll('.ix-hotspot').forEach((el) => el.remove());
    } else {
      clearHotspots();
    }

    const outgoing = contentStage.querySelector('.ix-screen-layer');
    if (!outgoing) {
      isAnimating = false;
      device.classList.remove('is-animating');
      return;
    }

    /* 预载目标页资源 */
    const { layer: incoming, data: incomingData } = await buildScreenLayer(targetPage);
    incoming.style.transition = 'none';
    incoming.style.transform = 'translateY(' + DEVICE_H + 'px)';
    contentStage.appendChild(incoming);
    await preloadIncomingDot(toTab, targetPage);

    /* 第一部分：nav 交叉 + 旧内容下移（同步 1s） */
    setNavTransitioning(fromTab, toTab);

    outgoing.style.transition = 'transform ' + SLIDE_MS + 'ms cubic-bezier(0.4, 0, 0.2, 1)';
    outgoing.style.transform = 'translateY(' + DEVICE_H + 'px)';

    await Promise.all([
      waitTransition(outgoing, 'transform'),
      wait(NAV_MS)
    ]);

    outgoing.remove();
    clearNavTransitions();

    /* 第二部分：新内容自下而上到位 */
    applyPageStyles(incomingData.style);
    currentPage = targetPage;
    device.dataset.screen = targetPage;
    if (window.__IX_INT_MODE__) {
      device.dataset.ixMode = 'home';
      delete device.dataset.ixRoute;
      if (targetPage !== '003') device.removeAttribute('data-content003');
    }
    await syncNavVisual(targetPage, toTab);

    incoming.style.transition = 'transform ' + SLIDE_MS + 'ms cubic-bezier(0.4, 0, 0.2, 1)';
    incoming.style.transform = 'translateY(0)';
    await waitTransition(incoming, 'transform');

    incoming.style.removeProperty('transition');
    incoming.style.removeProperty('transform');

    device.classList.remove('is-animating');
    isAnimating = false;
    setupHotspots();
    if (window.__IX_INT_MODE__ && window.IX_INT?.onPageReady) {
      await window.IX_INT.onPageReady(targetPage);
    }
  }

  function preloadScreens() {
    ['002', '003'].forEach((id) => {
      parseScreen(id).catch(() => {});
    });
  }

  async function init() {
    const hasEmbed = !!document.getElementById('ix-embed-001-device');
    const isHttp = location.protocol === 'http:' || location.protocol === 'https:';

    if (!isHttp && !hasEmbed) {
      loaderText.textContent = '需要本地 HTTP 服务';
      loaderHint.textContent =
        '请用 Live Server 或 python -m http.server 在本目录启动服务后访问 0-ALL.html。';
      return;
    }

    try {
      loaderText.textContent = '正在加载 0-ALL…';
      await mountPage('001');
      preloadScreens();
      loader.classList.add('hidden');
    } catch (err) {
      loaderText.textContent = '加载失败';
      loaderHint.textContent =
        '请通过本地 HTTP 服务打开。' + (err.message ? ' (' + err.message + ')' : '');
      console.error('[0-ALL]', err);
    }
  }

  window.IX0ALL = {
    init,
    mountPage,
    navigateTo,
    getCurrentPage: () => currentPage,
    remount: () => mountPage(currentPage),
    setupHotspots,
    refreshTopNav: setupHotspots,
    teardown,
    setPageStylesEnabled,
    isAnimating: () => isAnimating
  };

  if (!window.__IX_INT_MODE__) init();
})();
</script>
  <script>
/**
 * ALL-INT 桥接层：0-ALL 为一级入口，按当前页按需接入 1-ALL / 2-ALL / 3-ALL
 *
 * 流程：
 *   进入 → 0-ALL（001 + 底部四 icon）
 *   点四 icon → 0-ALL 切换 001/002/003
 *   在 003 点方框 → 接入 3-ALL 二级动效
 *   3-ALL 结束 → 回到 003（0-ALL 壳）
 */
(function () {
  'use strict';

  const DRILL_CSS_FILES = {
    '001': '1-ALL.html',
    '002': '2-ALL.html',
    '003': '3-ALL.html'
  };

  const PAGE_MOD = {
    '001': () => window.IX_ALL_001,
    '002': () => window.IX_ALL_002,
    '003': () => window.IX_ALL_003
  };

  const drillCSSCache = Object.create(null);
  const drillStyleEls = { '001': null, '002': null, '003': null };

  const device = document.getElementById('device');
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loaderText');
  const loaderHint = document.getElementById('loaderHint');

  function currentPage() {
    return window.IX0ALL?.getCurrentPage() || '001';
  }

  async function fetchHTML(file) {
    const res = await fetch(file);
    if (!res.ok) throw new Error('无法读取 ' + file);
    return res.text();
  }

  async function loadDrillCSS(pageId) {
    if (drillCSSCache[pageId]) return drillCSSCache[pageId];
    const html = await fetchHTML(DRILL_CSS_FILES[pageId]);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const css = doc.querySelector('style')?.textContent || '';
    drillCSSCache[pageId] = css;
    return css;
  }

  async function ensureDrillStyles() {
    for (const page of ['001', '002', '003']) {
      if (drillStyleEls[page]) continue;
      const css = await loadDrillCSS(page);
      const el = document.createElement('style');
      el.id = 'ix-drill-active-' + page;
      el.disabled = true;
      el.textContent = '/* drill ' + page + ' */\n' + css;
      document.head.appendChild(el);
      drillStyleEls[page] = el;
    }
  }

  function disableRouteStyles() {
    document.querySelectorAll('style[data-ix-route]').forEach((el) => {
      el.disabled = true;
    });
  }

  /** 一级 0-ALL 样式开；二级仅当前页 drill 样式开 */
  function setDrillCSS(pageId, enabled) {
    Object.keys(drillStyleEls).forEach((p) => {
      if (drillStyleEls[p]) drillStyleEls[p].disabled = !(enabled && p === pageId);
    });
    const base = document.getElementById('ix-all-base-styles');
    if (base) base.disabled = true;
    if (!enabled) disableRouteStyles();
    window.IX0ALL?.setPageStylesEnabled(!enabled);
  }

  function setHomeMode() {
    setDrillCSS(null, false);
    if (device) {
      device.dataset.ixMode = 'home';
      delete device.dataset.ixRoute;
      device.removeAttribute('data-content003');
      device.classList.remove('is-animating');
    }
  }

  /** 回到 0-ALL 一级（001/002/003 之一） */
  async function mountHomeContent(pageId) {
    setHomeMode();
    await window.IX0ALL.mountPage(pageId);
  }

  /** 进入 1/2/3-ALL 前：拆掉 0-ALL 壳 */
  async function beforeDrillDown() {
    const pageId = currentPage();
    window.IX0ALL.teardown();
    if (device) device.dataset.ixMode = 'drill';
    setDrillCSS(pageId, true);
  }

  function setupIxAllProxy() {
    window.IX_ALL = {
      activateModuleStyles(routeId) {
        const page = routeId.slice(0, 3);
        setDrillCSS(page, true);
        PAGE_MOD[page]()?.activateModuleStyles(routeId);
      },
      refreshHotspots() {
        const page = currentPage();
        const mod = PAGE_MOD[page]();
        if (!mod) return;
        Promise.resolve(mod.refreshHotspots()).then(() => {
          if (!device.dataset.ixRoute && device.dataset.ixMode === 'home') {
            window.IX0ALL.refreshTopNav?.();
          }
        });
      },
      isNavigating() {
        return !!window.IX0ALL?.isAnimating?.()
          || !!PAGE_MOD[currentPage()]()?.isNavigating?.();
      }
    };
  }

  async function init() {
    if (!device || !loader) return;

    const isHttp = location.protocol === 'http:' || location.protocol === 'https:';
    if (!isHttp) {
      loaderText.textContent = '需要本地 HTTP 服务';
      loaderHint.textContent = '请用 Live Server 或 python -m http.server 打开 ALL-INT.html';
      return;
    }

    if (!window.IX0ALL) {
      loaderText.textContent = '模块加载失败';
      loaderHint.textContent = '请确认 0-ALL.js 已加载';
      return;
    }

    const missing = ['IX_ALL_001', 'IX_ALL_002', 'IX_ALL_003'].filter((k) => !window[k]);
    if (missing.length) {
      loaderText.textContent = '模块加载失败';
      loaderHint.textContent = 'Missing: ' + missing.join(', ');
      return;
    }

    setupIxAllProxy();

    async function onPageReady(pageId) {
      const mod = PAGE_MOD[pageId]();
      if (mod) await mod.refreshHotspots();
    }

    window.IX_INT = {
      mountHomeContent,
      beforeDrillDown,
      setHomeMode,
      onPageReady,
      refreshTopNav: () => window.IX0ALL.setupHotspots()
    };

    try {
      loaderText.textContent = '正在加载 ALL-INT…';
      await ensureDrillStyles();
      await window.IX0ALL.init();
      loader.classList.add('hidden');
    } catch (err) {
      loaderText.textContent = '加载失败';
      loaderHint.textContent = err.message || String(err);
      console.error('[ALL-INT]', err);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
