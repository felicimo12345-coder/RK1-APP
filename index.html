<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ALL-INT V4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ix-device-w: 402px;
      --ix-device-h: 874px;
      --ix-pad: 12px;
      --ix-scale: 1;
      --ix-safe-top: env(safe-area-inset-top, 0px);
      --ix-safe-bottom: env(safe-area-inset-bottom, 0px);
      --ix-safe-left: env(safe-area-inset-left, 0px);
      --ix-safe-right: env(safe-area-inset-right, 0px);
      --ix-ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      min-height: 100dvh;
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    .page {
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      max-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding:
        max(6px, var(--ix-safe-top))
        max(var(--ix-pad), var(--ix-safe-right))
        max(6px, var(--ix-safe-bottom))
        max(var(--ix-pad), var(--ix-safe-left));
      box-sizing: border-box;
      overflow: hidden;
    }

    .page__title {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      letter-spacing: 0.06em;
      font-family: "等线", "DengXian", sans-serif;
    }

    html.ix-mobile .page__title {
      display: none;
    }

    .device-wrap {
      position: relative;
      flex-shrink: 0;
      margin-left: auto;
      margin-right: auto;
      width: var(--ix-device-w);
      height: var(--ix-device-h);
      transform: scale(var(--ix-scale));
      transform-origin: center center;
      will-change: transform;
    }

    #device {
      position: relative;
      width: var(--ix-device-w);
      height: var(--ix-device-h);
      overflow: hidden;
      background: #060606;
      box-shadow: 0 32px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    #ix-content-stage {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .ix-screen-layer {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden;
      will-change: transform;
    }

    #ix-content-stage .ix-screen-layer .layer {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    #ix-content-stage .ix-screen-layer .text {
      position: absolute;
      margin: 0;
      padding: 0;
      pointer-events: none;
    }

    #ix-nav-pin {
      position: absolute;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      isolation: isolate;
    }

    .ix-nav-glass {
      position: absolute;
      left: 38px;
      top: 770px;
      width: 326px;
      height: 77px;
      border-radius: 999px;
      z-index: 1 !important;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.38);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        0 4px 28px rgba(0, 0, 0, 0.1);
    }

    .ix-nav-dot {
      position: absolute;
      width: 52px;
      height: 50px;
      z-index: 5 !important;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    .ix-nav-icon {
      position: absolute;
      z-index: 10 !important;
      display: block;
      pointer-events: none;
      user-select: none;
      object-fit: contain;
    }

    .ix-hotspot {
      position: absolute;
      z-index: 200;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* 底部四 icon 热点须高于 002-4 / 003-4 等内容热点，避免首次点击被误识别 */
    .ix-hotspot--topnav {
      z-index: 300;
    }
    .ix-hotspot:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.45);
      outline-offset: 2px;
    }

    #device.is-animating .ix-hotspot {
      pointer-events: none;
    }

    #device[data-ix-mode="home"] #ix-nav-pin {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      font-size: 14px;
      font-family: "等线", "DengXian", sans-serif;
      z-index: 9999;
      transition: opacity 0.35s;
    }
    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader__hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      max-width: 320px;
      text-align: center;
      line-height: 1.5;
      padding: 0 16px;
    }
    #ix-embed-root { display: none !important; }

    /* drill 准备阶段：冻结当前画面，DOM 重建在遮罩下进行 */
    .ix-drill-freeze {
      position: absolute;
      inset: 0;
      z-index: 200;
      overflow: hidden;
      pointer-events: none;
    }
    .ix-drill-freeze__snap {
      width: 100%;
      height: 100%;
    }
    .ix-drill-freeze__snap > .ix-drill-freeze__device {
      position: relative;
      width: var(--ix-device-w);
      height: var(--ix-device-h);
      overflow: hidden;
      background: #060606;
      box-shadow: 0 32px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    /* 手机端：锁定字号与换行，避免 iOS 文本自动放大导致框内错位 */
    html.ix-mobile {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html.ix-mobile #device,
    html.ix-mobile #device .text,
    html.ix-mobile #ix-content-stage .text {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      font-synthesis: none;
    }

    html.ix-mobile #device .text--label,
    html.ix-mobile #device .text--label-sm,
    html.ix-mobile #ix-content-stage .text--label,
    html.ix-mobile #ix-content-stage .text--label-sm {
      font-size: 12px !important;
      line-height: 13px !important;
      letter-spacing: 0 !important;
    }

    html.ix-mobile #device .text--heart-rate,
    html.ix-mobile #device .text--over-all,
    html.ix-mobile #device .text--temperature,
    html.ix-mobile #device .text--bpm,
    html.ix-mobile #device .text--respiratory,
    html.ix-mobile #device .text--temp,
    html.ix-mobile #device .text--motor,
    html.ix-mobile #device .text--battery,
    html.ix-mobile #device .text--ventilation,
    html.ix-mobile #device .text--location,
    html.ix-mobile #device .text--measurements,
    html.ix-mobile #device .text--motor-val,
    html.ix-mobile #device .text--battery-val,
    html.ix-mobile #device .text--vent-val,
    html.ix-mobile #device .text--temp-val,
    html.ix-mobile #ix-content-stage .text--heart-rate,
    html.ix-mobile #ix-content-stage .text--over-all,
    html.ix-mobile #ix-content-stage .text--temperature,
    html.ix-mobile #ix-content-stage .text--bpm,
    html.ix-mobile #ix-content-stage .text--respiratory {
      white-space: nowrap !important;
    }

    html.ix-mobile #device .text--ai-steward,
    html.ix-mobile #device .text--mechanical {
      white-space: pre-line !important;
      font-size: 12px !important;
      line-height: 13px !important;
      letter-spacing: 0 !important;
      word-break: keep-all;
      overflow: hidden;
    }

    html.ix-mobile #device .text--ai-steward {
      width: 55px !important;
      min-width: 55px !important;
      max-width: 55px !important;
    }

    html.ix-mobile #device .text--mechanical {
      width: 73px !important;
      min-width: 73px !important;
      max-width: 73px !important;
    }

    html.ix-mobile #device .text--sleep-label {
      white-space: pre-line !important;
      width: 43px !important;
      min-width: 43px !important;
      max-width: 43px !important;
      font-size: 12px !important;
      line-height: 13px !important;
      letter-spacing: 0 !important;
      word-break: keep-all;
      overflow: hidden;
    }

    html.ix-mobile #device .text--hr-value,
    html.ix-mobile #device .text--good,
    html.ix-mobile #device .text--temp-value,
    html.ix-mobile #device .text--resp-value,
    html.ix-mobile #device .text--sleep-value,
    html.ix-mobile #ix-content-stage .text--hr-value,
    html.ix-mobile #ix-content-stage .text--good,
    html.ix-mobile #ix-content-stage .text--temp-value,
    html.ix-mobile #ix-content-stage .text--resp-value,
    html.ix-mobile #ix-content-stage .text--sleep-value {
      display: flex !important;
      align-items: flex-end !important;
      letter-spacing: 0 !important;
    }

    html.ix-mobile #device .text--sleep-value,
    html.ix-mobile #ix-content-stage .text--sleep-value {
      justify-content: center !important;
    }

    html.ix-mobile #device .score-main,
    html.ix-mobile #device .value-main,
    html.ix-mobile #ix-content-stage .score-main,
    html.ix-mobile #ix-content-stage .value-main {
      font-size: 48px !important;
      line-height: 40px !important;
      flex-shrink: 0;
    }

    html.ix-mobile #device .score-sub,
    html.ix-mobile #device .value-sub,
    html.ix-mobile #ix-content-stage .score-sub,
    html.ix-mobile #ix-content-stage .value-sub {
      font-size: 12px !important;
      line-height: 13px !important;
      flex-shrink: 0;
    }

    html.ix-mobile #device .text--quote,
    html.ix-mobile #device .ix-extras .text--quote {
      display: flex !important;
      align-items: flex-end !important;
      justify-content: flex-end !important;
      white-space: nowrap !important;
      letter-spacing: 0 !important;
    }

    html.ix-mobile #device .ix-metrics-fade .text,
    html.ix-mobile #device .ix-s-content .text,
    html.ix-mobile #device .ix-m-content .text,
    html.ix-mobile #device .ix-m-body .text,
    html.ix-mobile #device .ix-m-header .text,
    html.ix-mobile #device .ix-ai-content .text,
    html.ix-mobile #device .ix-ai-body .text,
    html.ix-mobile #device .ix-l-content .text,
    html.ix-mobile #device .ix-extras .text {
      font-family: "等线", "DengXian", "PingFang SC", sans-serif;
    }
  </style>
</head>

      transform-origin: center center;
    }

    .device {
      position: relative;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: var(--bg);

        inset 1px 2px 0 rgba(255, 255, 255, 0.14),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08);

window.__IX_EMBED_LOAD__ = function (id, cfg) {

<script>
/** 移动端性能：检测、动画时长缩放、视口自适应（iPhone 14 等） */
window.__IX_PERF__ = (function () {
  'use strict';
  const mobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && Math.min(screen.width, screen.height) < 900);
  if (mobile) document.documentElement.classList.add('ix-mobile');
  const SCALE = 1;
  function ms(n) { return n; }
  function layoutPx(n) { return mobile ? Math.round(n) : n; }

  const DEVICE_W = 402;
  const DEVICE_H = 874;

  function fitDevice() {
    const pad = 12;
    const root = document.documentElement;
    const safeT = parseFloat(getComputedStyle(root).getPropertyValue('--ix-safe-top')) || 0;
    const safeB = parseFloat(getComputedStyle(root).getPropertyValue('--ix-safe-bottom')) || 0;
    const safeL = parseFloat(getComputedStyle(root).getPropertyValue('--ix-safe-left')) || 0;
    const safeR = parseFloat(getComputedStyle(root).getPropertyValue('--ix-safe-right')) || 0;
    const vw = window.innerWidth - pad * 2 - safeL - safeR;
    const vh = window.innerHeight - pad * 2 - safeT - safeB;
    const s = Math.min(1, vw / DEVICE_W, vh / DEVICE_H);
    root.style.setProperty('--ix-scale', String(Math.max(0.01, s)));
  }

  fitDevice();
  window.addEventListener('resize', fitDevice, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(fitDevice, 100), { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitDevice, { passive: true });
  }

  return { mobile, ms, SCALE, fitDevice, layoutPx };
})();
</script>
<script>
/** 全局资源加载：WebP 优先、分批、单次请求、URL 缓存、首屏优先 */
window.__IX_ASSETS__ = (function () {
  'use strict';

  const mobile = window.__IX_PERF__?.mobile;
  const BATCH = mobile ? 3 : 5;
  const RX_EXT = /\.(png|jpe?g|webp)$/i;
  const PRIORITY_RE = /layer--(?:header|nav|avatar|metrics|chat|pet)/i;
  const urlCache = new Map();

  function cacheKey(assetDir, name) {
    return assetDir + '/' + name.replace(RX_EXT, '');
  }

  function candidates(assetDir, name) {
    const base = name.replace(RX_EXT, '');
    const png = assetDir + '/' + base + '.png';
    const webp = assetDir + '/' + base + '.webp';
    return mobile ? [png] : [webp, png];
  }

  function candidatesFromUrl(url) {
    const m = String(url).match(/^(.+)\/([^/]+)$/);
    if (!m) return [url];
    return candidates(m[1], m[2]);
  }

  function setImgSrc(el, url) {
    return new Promise((resolve) => {
      const done = (ok) => {
        el.onload = null;
        el.onerror = null;
        if (!ok) el.removeAttribute('src');
        resolve(ok);
      };
      el.decoding = 'async';
      el.onload = () => done(true);
      el.onerror = () => done(false);
      el.src = url;
    });
  }

  async function tryUrlsOnImg(el, urls) {
    for (const url of urls) {
      if (await setImgSrc(el, url)) return url;
    }
    el.removeAttribute('src');
    return null;
  }

  async function resolveAssetUrl(assetDir, name) {
    const key = cacheKey(assetDir, name);
    if (urlCache.has(key)) {
      const hit = urlCache.get(key);
      return hit || null;
    }
    const probe = new Image();
    probe.decoding = 'async';
    for (const url of candidates(assetDir, name)) {
      if (await setImgSrc(probe, url)) {
        urlCache.set(key, url);
        return url;
      }
    }
    urlCache.set(key, '');
    return null;
  }

  async function resolveAssetPath(url) {
    const m = String(url).match(/^(.+)\/([^/]+)$/);
    if (!m) return url;
    return resolveAssetUrl(m[1], m[2]);
  }

  async function assignImgUrl(el, url) {
    if (!el || !url) return null;
    const m = String(url).match(/^(.+)\/([^/]+)$/);
    if (m) {
      const key = cacheKey(m[1], m[2]);
      if (urlCache.has(key)) {
        const hit = urlCache.get(key);
        if (hit) await setImgSrc(el, hit);
        else el.removeAttribute('src');
        return hit || null;
      }
    }
    const resolved = await tryUrlsOnImg(el, candidatesFromUrl(url));
    if (m) urlCache.set(cacheKey(m[1], m[2]), resolved || '');
    return resolved;
  }

  async function assignImgFile(el, assetDir, name) {
    if (!el || !name) return null;
    const key = cacheKey(assetDir, name);
    if (urlCache.has(key)) {
      const hit = urlCache.get(key);
      if (hit) await setImgSrc(el, hit);
      else el.removeAttribute('src');
      return hit || null;
    }
    const resolved = await tryUrlsOnImg(el, candidates(assetDir, name));
    urlCache.set(key, resolved || '');
    if (resolved) {
      const frame = el.closest('[class*="-frame"]');
      if (frame) frame.dataset.bgReady = 'true';
    }
    return resolved;
  }

  async function bindBatch(layers, assetDir) {
    for (let i = 0; i < layers.length; i += BATCH) {
      await Promise.all(layers.slice(i, i + BATCH).map(async (el) => {
        const name = el.dataset.asset;
        if (name) await assignImgFile(el, assetDir, name);
      }));
    }
  }

  async function bindAssets(root, assetDir) {
    const layers = [...root.querySelectorAll('[data-asset]')];
    const priority = [];
    const rest = [];
    layers.forEach((el) => {
      (PRIORITY_RE.test(el.className || '') ? priority : rest).push(el);
    });
    await bindBatch(priority, assetDir);
    await bindBatch(rest, assetDir);
  }

  async function applyBgCover(el, assetDir, name) {
    if (!el) return false;
    const url = await resolveAssetUrl(assetDir, name);
    if (!url) return false;
    el.style.background = 'url("' + url + '") center / cover no-repeat';
    const frame = el.closest('[class*="-frame"]');
    if (frame) frame.dataset.bgReady = 'true';
    return true;
  }

  function markFrameReady(frame) {
    if (frame) frame.dataset.bgReady = 'true';
  }

  async function warmScreen(screenId, assetDir) {
    const tpl = document.getElementById('ix-embed-' + screenId + '-device');
    if (!tpl) return;
    const tmp = document.createElement('div');
    tmp.innerHTML = tpl.innerHTML;
    const names = [...new Set([...tmp.querySelectorAll('[data-asset]')].map((el) => el.dataset.asset).filter(Boolean))];
    for (let i = 0; i < names.length; i += BATCH) {
      await Promise.all(names.slice(i, i + BATCH).map((name) => resolveAssetUrl(assetDir, name)));
    }
  }

  async function warmAll() {
    const jobs = [
      ['001', '001_assets'], ['001-1', '001-1_assets'], ['001-2', '001-2_assets'], ['001-3', '001-3_assets'],
      ['002', '002_assets'], ['002-1', '002-1_assets'], ['002-2', '002-2_assets'], ['002-3', '002-3_assets'], ['002-4', '002-4_assets'],
      ['003', '003_assets'], ['003-1', '003-1_assets'], ['003-2', '003-2_assets'], ['003-3', '003-3_assets'], ['003-4', '003-4_assets']
    ];
    for (const [id, dir] of jobs) {
      await warmScreen(id, dir);
    }
  }

  const DRILL_WARM = {
    '001-1': [['001', '001_assets'], ['001-1', '001-1_assets']],
    '001-2': [['001', '001_assets'], ['001-2', '001-2_assets']],
    '001-3': [['001', '001_assets'], ['001-3', '001-3_assets']],
    '002-1': [['002', '002_assets'], ['002-1', '002-1_assets']],
    '002-2': [['002', '002_assets'], ['002-2', '002-2_assets']],
    '002-3': [['002', '002_assets'], ['002-3', '002-3_assets']],
    '002-4': [['002', '002_assets'], ['002-4', '002-4_assets']],
    '003-1': [['003', '003_assets'], ['003-1', '003-1_assets']],
    '003-2': [['003', '003_assets'], ['003-2', '003-2_assets']],
    '003-3': [['003', '003_assets'], ['003-3', '003-3_assets']],
    '003-4': [['003', '003_assets'], ['003-4', '003-4_assets']]
  };

  async function preloadDrillRoute(routeId) {
    const sets = DRILL_WARM[routeId];
    if (!sets) return;
    const keys = new Set();
    for (const [id, dir] of sets) {
      await warmScreen(id, dir);
      const tpl = document.getElementById('ix-embed-' + id + '-device');
      if (tpl) {
        const tmp = document.createElement('div');
        tmp.innerHTML = tpl.innerHTML;
        [...tmp.querySelectorAll('[data-asset]')].forEach((el) => {
          if (el.dataset.asset) keys.add(cacheKey(dir, el.dataset.asset));
        });
      }
    }
    const decodeJobs = [];
    keys.forEach((key) => {
      const url = urlCache.get(key);
      if (!url) return;
      const img = new Image();
      img.decoding = 'async';
      decodeJobs.push(new Promise((resolve) => {
        img.onload = img.onerror = () => {
          if (img.decode) img.decode().then(resolve).catch(resolve);
          else resolve();
        };
        img.src = url;
      }));
    });
    if (decodeJobs.length) await Promise.all(decodeJobs);
  }

    bindAssets,
    assignImgUrl,
    assignImgFile,
    resolveAssetUrl,
    resolveAssetPath,
    applyBgCover,
    markFrameReady,
    warmScreen,

<script>
/** drill 过渡：预载期间保持画面；DOM 切换时用快照遮罩，就绪后再开启动效 */
window.__IX_DRILL__ = (function () {
  'use strict';

  function freeze() {
    const device = document.getElementById('device');
    const wrap = device?.closest('.device-wrap');
    if (!device || !wrap) return null;

    const freezeEl = document.createElement('div');
    freezeEl.className = 'ix-drill-freeze';
    freezeEl.setAttribute('aria-hidden', 'true');

    const snap = document.createElement('div');
    snap.className = 'ix-drill-freeze__snap';

    const shell = document.createElement('div');
    shell.className = 'ix-drill-freeze__device';

    const clone = device.cloneNode(true);
    clone.removeAttribute('id');
    clone.querySelectorAll('.ix-hotspot').forEach((el) => el.remove());

    shell.appendChild(clone);
    snap.appendChild(shell);
    freezeEl.appendChild(snap);
    wrap.appendChild(freezeEl);
    return freezeEl;
  }

  function unfreeze(freezeEl) {
    if (freezeEl && freezeEl.parentNode) freezeEl.remove();
  }

  function settlePaint() {
    return new Promise((resolve) => {
      requestAnimationFrame(() => requestAnimationFrame(resolve));
    });
  }

  return { freeze, unfreeze, settlePaint };
})();

        onFrame(ease(raw), raw);
        if (raw < 1) requestAnimationFrame(frame);

  function loadEmbeddedScreen(id) {
    const cfg = SCREENS[id];
    if (!cfg) return null;
    const styleNode = document.getElementById('ix-embed-' + id + '-style');
    const deviceTpl = document.getElementById('ix-embed-' + id + '-device');
    if (!deviceTpl) return null;
    const innerHTML = deviceTpl.innerHTML.trim();
    if (!innerHTML) return null;
    return {
      id,
      style: styleNode ? styleNode.textContent : '',
      innerHTML,
      assetDir: cfg.assetDir
    };
  }

  async function parseScreen(id) {
    if (screenCache[id]) return screenCache[id];

    const embedded = loadEmbeddedScreen(id);
    if (embedded) {
      screenCache[id] = embedded;
      return embedded;
    }

    const cfg = SCREENS[id];
    const res = await fetch(cfg.file);
    if (!res.ok) throw new Error('无法读取 ' + cfg.file);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const data = {
      id,
      style: doc.querySelector('style')?.textContent || '',
      innerHTML: doc.querySelector('.device')?.innerHTML || '',
      assetDir: cfg.assetDir
    };
    if (!data.innerHTML) throw new Error(cfg.file + ' 中未找到 .device');
    screenCache[id] = data;
    return data;
  }

    try {
      loaderText.textContent = '正在加载 0-ALL…';
      await mountPage('001');
      window.__IX_PERF__.fitDevice();
      loader.classList.add('hidden');
    } catch (err) {
      loaderText.textContent = '加载失败';
      loaderHint.textContent =
        '请通过本地 HTTP 服务打开。' + (err.message ? ' (' + err.message + ')' : '');
      console.error('[0-ALL]', err);
    }
  }

  window.IX0ALL = {
    init,
    mountPage,
    navigateTo,
    getCurrentPage: () => currentPage,
    remount: () => mountPage(currentPage),
    setupHotspots,
    refreshTopNav: setupHotspots,
    teardown,
    setPageStylesEnabled,
    isAnimating: () => isAnimating
  };

  if (!window.__IX_INT_MODE__) init();
})();
</script>
  <script>
/**
 * ALL-INT 桥接层：0-ALL 为一级入口，按当前页按需接入 1-ALL / 2-ALL / 3-ALL
 *
 * 流程：
 *   进入 → 0-ALL（001 + 底部四 icon）
 *   点四 icon → 0-ALL 切换 001/002/003
 *   在 003 点方框 → 接入 3-ALL 二级动效
 *   3-ALL 结束 → 回到 003（0-ALL 壳）
 */
(function () {
  'use strict';

  const DRILL_CSS_EMBED = {
    '001': 'ix-drill-embed-001',
    '002': 'ix-drill-embed-002',
    '003': 'ix-drill-embed-003'
  };

  const PAGE_MOD = {
    '001': () => window.IX_ALL_001,
    '002': () => window.IX_ALL_002,
    '003': () => window.IX_ALL_003
  };

  const drillCSSCache = Object.create(null);
  const drillStyleEls = { '001': null, '002': null, '003': null };

  const device = document.getElementById('device');
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loaderText');
  const loaderHint = document.getElementById('loaderHint');

  function currentPage() {
    return window.IX0ALL?.getCurrentPage() || '001';
  }

  async function fetchHTML(file) {
    const res = await fetch(file);
    if (!res.ok) throw new Error('无法读取 ' + file);
    return res.text();
  }

  async function loadDrillCSS(pageId) {
    if (drillCSSCache[pageId]) return drillCSSCache[pageId];
    const el = document.getElementById(DRILL_CSS_EMBED[pageId]);
    const css = el ? el.textContent : '';
    drillCSSCache[pageId] = css;
    return css;
  }

  async function ensureDrillStyles() {
    for (const page of ['001', '002', '003']) {
      if (drillStyleEls[page]) continue;
      const css = await loadDrillCSS(page);
      const el = document.createElement('style');
      el.id = 'ix-drill-active-' + page;
      el.disabled = true;
      el.textContent = '/* drill ' + page + ' */\n' + css;
      document.head.appendChild(el);
      drillStyleEls[page] = el;
    }
  }

  function disableRouteStyles() {
    document.querySelectorAll('style[data-ix-route]').forEach((el) => {
      el.disabled = true;
    });
  }

  /** 一级 0-ALL 样式开；二级仅当前页 drill 样式开 */
  function setDrillCSS(pageId, enabled) {
    Object.keys(drillStyleEls).forEach((p) => {
      if (drillStyleEls[p]) drillStyleEls[p].disabled = !(enabled && p === pageId);
    });
    const base = document.getElementById('ix-all-base-styles');
    if (base) base.disabled = true;
    if (!enabled) disableRouteStyles();
    window.IX0ALL?.setPageStylesEnabled(!enabled);
  }

  function setHomeMode() {
    setDrillCSS(null, false);
    if (device) {
      device.dataset.ixMode = 'home';
      delete device.dataset.ixRoute;
      device.removeAttribute('data-content003');
      device.classList.remove('is-animating');
    }
  }

  /** 回到 0-ALL 一级（001/002/003 之一） */
  async function mountHomeContent(pageId) {
    setHomeMode();
    await window.IX0ALL.mountPage(pageId);
  }

  /** 进入 1/2/3-ALL 前：拆掉 0-ALL 壳 */
  async function beforeDrillDown() {
    const pageId = currentPage();
    window.IX0ALL.teardown();
    if (device) device.dataset.ixMode = 'drill';
    setDrillCSS(pageId, true);
  }

  function setupIxAllProxy() {
    window.IX_ALL = {
      activateModuleStyles(routeId) {
        const page = routeId.slice(0, 3);
        setDrillCSS(page, true);
        PAGE_MOD[page]()?.activateModuleStyles(routeId);
      },
      refreshHotspots() {
        const page = currentPage();
        const mod = PAGE_MOD[page]();
        if (!mod) return;
        Promise.resolve(mod.refreshHotspots()).then(() => {
          if (!device.dataset.ixRoute && device.dataset.ixMode === 'home') {
            window.IX0ALL.refreshTopNav?.();
          }
        });
      },
      isNavigating() {
        return !!window.IX0ALL?.isAnimating?.()
          || !!PAGE_MOD[currentPage()]()?.isNavigating?.();
      }
    };
  }

  async function init() {
    if (!device || !loader) return;

    const isHttp = location.protocol === 'http:' || location.protocol === 'https:';
    if (!isHttp) {
      loaderText.textContent = '需要本地 HTTP 服务';
      loaderHint.textContent = '请用 Live Server 或 python -m http.server 打开 ALL-INT.html';
      return;
    }

    if (!window.IX0ALL) {
      loaderText.textContent = '模块加载失败';
      loaderHint.textContent = '请确认 0-ALL.js 已加载';
      return;
    }

    const missing = ['IX_ALL_001', 'IX_ALL_002', 'IX_ALL_003'].filter((k) => !window[k]);
    if (missing.length) {
      loaderText.textContent = '模块加载失败';
      loaderHint.textContent = 'Missing: ' + missing.join(', ');
      return;
    }

    setupIxAllProxy();

    async function onPageReady(pageId) {
      const mod = PAGE_MOD[pageId]();
      if (mod) await mod.refreshHotspots();
    }

    window.IX_INT = {
      mountHomeContent,
      beforeDrillDown,
      setHomeMode,
      onPageReady,
      refreshTopNav: () => window.IX0ALL.setupHotspots()
    };

    try {
      loaderText.textContent = '正在加载 ALL-INT…';
      await ensureDrillStyles();
      await window.IX0ALL.init();
      window.__IX_PERF__.fitDevice();
      loader.classList.add('hidden');
      const warmDrill = async () => {
        const page = window.IX0ALL?.getCurrentPage?.() || '001';
        const sets = {
          '001': [['001-1', '001-1_assets'], ['001-2', '001-2_assets'], ['001-3', '001-3_assets']],
          '002': [['002-1', '002-1_assets'], ['002-2', '002-2_assets'], ['002-3', '002-3_assets'], ['002-4', '002-4_assets']],
          '003': [['003-1', '003-1_assets'], ['003-2', '003-2_assets'], ['003-3', '003-3_assets'], ['003-4', '003-4_assets']]
        };
        for (const [id, dir] of (sets[page] || [])) {
          await window.__IX_ASSETS__.warmScreen(id, dir);
        }
      };
      if (typeof requestIdleCallback === 'function') requestIdleCallback(() => { warmDrill().catch(() => {}); }, { timeout: 2500 });
      else setTimeout(() => { warmDrill().catch(() => {}); }, 800);
    } catch (err) {
      loaderText.textContent = '加载失败';
      loaderHint.textContent = err.message || String(err);
      console.error('[ALL-INT]', err);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
